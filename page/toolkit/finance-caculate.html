<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>理财计算</title>
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="stylesheet" href="../../lib/IconFont/AliIconFont/kitbox/iconfont.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/toolkit/finance-caculate.css">
    <script src="../../lib/Framework/jquery/jquery-1.12.4.min.js"></script>
    <script src="../../js/base.js"></script>
    <script src="../../js/toolkit/finance-caculate.js"></script>
</head>
<body style="display: none">
<div class="main-shell">
<header class="main-header">
    <!-- 用户信息面板 -->
    <!--<div class="logo-title">LOGO TITLE</div>-->
    <div class="nav-bar">
        <a href="../toolkit.html"><div class="icon btn menu"><i class="iconfont icon-list"></i></div></a>
        <div class="title"><span>理财计算</span></div>
        <a href="../../index.html"><div class="icon btn home"><i class="iconfont icon-home"></i></div></a>
    </div>
</header>
<!-- 主功能区 -->
<div class="main-body">
    <!-- 工具区 -->
    <div class="zone-form">
        <div class="field-title select-option finance-type">
            <div><b class="cell-bulletin">类型</b></div>
            <div class="cell-option active">
                <span class="active">滚动复利</span>
            </div>
        </div>

        <div id="caculator" class="field-content">
            <table>
                <tr>
                    <td class="td-title">初始本金</td>
                    <td><input id="principal" maxlength="16" placeholder="请录入金额..." /></td>
                </tr>
                <tr>
                    <td class="td-title">每期追加</td>
                    <td><input id="deposit" maxlength="16" placeholder="请录入金额..." /></td>
                </tr>
                <tr>
                    <td class="td-title">复利率</td>
                    <td><input id="interest" maxlength="16" placeholder="请录入比率..." /></td>
                </tr>
                <tr>
                    <td class="td-title">存期</td>
                    <td><input id="maturity" maxlength="16" placeholder="请录入期限..." /></td>
                </tr>
            </table>
        </div>
    </div>

    <div class="zone-tip">
        <p><b>注：</b><span>“粗体”</span>普通字体<span>相关</span>说明</p>
    </div>

    <div class="zone-act">
        <div id="btnCaculate" class="div-btn">计算</div>
        <div id="btnReset" class="div-btn">重置</div>
    </div>

    <div class="zone-empty">
    </div>
</div>
<footer class="main-footer">
    <div class="">
        为人民服务
    </div>
    <div class="">
        <strong>Copyright © 2018-? <a href="#">有关机构</a>.</strong> 保留所有权利.
    </div>
</footer>
</div>
<style type="text/css"></style>
<script></script>
</body>
</html>
